name: Release

# Triggered on tags like v0.1.0 — publishes ALL workspace packages whose
# version matches the tag. For per-package versioning, use Changesets and
# replace this workflow accordingly.
on:
  push:
    tags:
      - 'v*'

# Required for npm provenance via OIDC (Sigstore-signed attestation)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version read from packageManager field in root package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, which has built-in OIDC trusted-
          # publisher support. Node 20's bundled npm 10.x is too old.
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Belt-and-suspenders: explicitly install latest npm so OIDC support is
      # guaranteed regardless of which minor Node 24 brings.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      # Trusted publishing — no NPM_TOKEN required. The npm CLI uses the
      # GitHub Actions OIDC token to authenticate. Each package must have
      # "publishConfig.access": "public" + a trusted publisher configured
      # on the npm package page at npmjs.com.
      #
      # Pre-release tags (v0.1.0-alpha.1, v0.2.0-beta.3, etc.) ship under
      # the matching dist-tag (alpha / beta / rc) instead of `latest`, so
      # casual `npm install @rootherald/node` keeps pulling stable releases.
      - name: Publish to npm with provenance
        run: |
          tag_ref="${GITHUB_REF_NAME#v}"
          if [[ "$tag_ref" == *-* ]]; then
            prerelease_id="${tag_ref#*-}"
            dist_tag="${prerelease_id%%.*}"
            echo "Publishing under dist-tag: $dist_tag (from $GITHUB_REF_NAME)"
            pnpm -r publish --no-git-checks --provenance --access public --tag "$dist_tag"
          else
            echo "Publishing under default dist-tag: latest"
            pnpm -r publish --no-git-checks --provenance --access public
          fi

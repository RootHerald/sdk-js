name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version read from packageManager field in root package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so workspace consumers (packages/js, etc.) can resolve
      # @rootherald/contracts' generated .d.ts during typecheck.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test
